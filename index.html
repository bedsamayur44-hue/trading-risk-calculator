<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trading Risk Calculator | Position Size Tool</title>

<meta name="description" content="Free Trading Risk Calculator. Calculate position size based on account balance, risk percentage and stop loss pips. Perfect for forex and gold traders.">

<meta name="keywords" content="trading risk calculator, position size calculator, forex risk calculator, trading position size">

<style>

:root{
--bg:#ffffff;
--card:#f5f5f5;
--text:#111;
--accent:#4cafef;
}

body.dark{
--bg:#121212;
--card:#1e1e1e;
--text:#ffffff;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
padding:20px;
}

.container{
max-width:420px;
width:100%;
background:var(--card);
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:var(--accent);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.result{
margin-top:20px;
font-size:18px;
text-align:center;
font-weight:bold;
}

.toggle{
position:absolute;
top:20px;
right:20px;
cursor:pointer;
background:var(--card);
padding:8px 14px;
border-radius:20px;
font-size:14px;
}

footer{
margin-top:20px;
text-align:center;
font-size:12px;
opacity:0.6;
}

@media(max-width:500px){

.container{
padding:20px;
}

h1{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="toggle" onclick="toggleDark()">🌙 Dark</div>

<div class="container">

<h1>Trading Risk Calculator</h1>

<input type="number" id="balance" placeholder="Account Balance ($)">

<input type="number" id="risk" placeholder="Risk % per trade">

<input type="number" id="stoploss" placeholder="Stop Loss (pips)">

<button onclick="calculate()">Calculate Position Size</button>

<div class="result" id="result"></div>

<footer>
Free Trading Tool
</footer>

</div>

<script>

function calculate(){

let balance = document.getElementById("balance").value;
let risk = document.getElementById("risk").value;
let stoploss = document.getElementById("stoploss").value;

if(balance=="" || risk=="" || stoploss==""){
document.getElementById("result").innerHTML="Enter all fields";
return;
}

let riskAmount = balance * (risk/100);

let positionSize = riskAmount / stoploss;

document.getElementById("result").innerHTML =
"Position Size: " + positionSize.toFixed(2) + " lots";

}

function toggleDark(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
